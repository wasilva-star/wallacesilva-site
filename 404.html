<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.box{
max-width:500px;
padding:40px;
background:rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter:blur(10px);
}

h1{
font-size:90px;
margin:0;
color:#38bdf8;
}

p{
font-size:20px;
opacity:0.8;
}

a{
display:inline-block;
margin-top:20px;
padding:15px 30px;
background:#38bdf8;
color:#000;
text-decoration:none;
border-radius:12px;
font-weight:bold;
}

a:hover{
transform:scale(1.05);
}

/* MAGO */
.mago-topo{
position:absolute;
top:90px;
left:50%;
transform:translateX(-50%);
z-index:1;
pointer-events:none;
}

.mago-topo img{
width:48px;
margin-top:8px;
opacity:.95;
animation:flutuar 3s ease-in-out infinite, brilho 2.5s ease-in-out infinite;
}

@keyframes flutuar{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

@keyframes brilho{
0%,100%{filter:drop-shadow(0 0 8px rgba(34,211,238,.5))}
50%{filter:drop-shadow(0 0 18px rgba(34,211,238,1))}
}

</style>
</head>

<body>

    <!-- MAGO -->
<div class="mago-topo">
<img src="img/atom.png" alt="Mago">
</div>

<div class="box">
<h1>404</h1>
<p>Ops! Página não encontrada.</p>

<p>Nossa equipe está online trabalhando no desenvolvimento desta página para oferecer a melhor experiência possível. Pedimos desculpas pelo transtorno e agradecemos a sua compreensão.
</p>
<a class="btn secondary" href="index.html" style="margin-left:10px;">Voltar</a>
</div>

</body>
</html>
