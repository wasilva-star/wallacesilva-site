<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | ECALLAW Assistência Técnica</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
height:100vh;
background:linear-gradient(135deg,#020617,#0f172a,#111827);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

/* Fundo animado */
body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#06b6d4 0%,transparent 70%);
top:-200px;
left:-200px;
opacity:.25;
animation:float 8s infinite alternate;
}

body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#3b82f6 0%,transparent 70%);
bottom:-200px;
right:-200px;
opacity:.20;
animation:float 10s infinite alternate;
}

@keyframes float{
0%{transform:translateY(0px) translateX(0px);}
100%{transform:translateY(40px) translateX(30px);}
}

.container{
position:relative;
z-index:2;
max-width:650px;
width:90%;
padding:45px;
border-radius:25px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(14px);
box-shadow:0 25px 60px rgba(0,0,0,.45);
text-align:center;
border:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:30px;
font-weight:900;
letter-spacing:2px;
color:#22d3ee;
margin-bottom:10px;
}

.erro{
font-size:130px;
font-weight:900;
line-height:1;
background:linear-gradient(90deg,#22d3ee,#3b82f6,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.03);}
}

h1{
font-size:32px;
margin-top:10px;
margin-bottom:15px;
}

p{
font-size:18px;
line-height:1.6;
color:#cbd5e1;
margin-bottom:30px;
}

.botoes{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:16px 28px;
border-radius:14px;
text-decoration:none;
font-weight:700;
transition:.3s;
font-size:16px;
}

.home{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
color:#fff;
box-shadow:0 10px 25px rgba(59,130,246,.4);
}

.home:hover{
transform:translateY(-4px);
}

.whats{
background:#22c55e;
color:#fff;
box-shadow:0 10px 25px rgba(34,197,94,.35);
}

.whats:hover{
transform:translateY(-4px);
}

.info{
margin-top:25px;
font-size:14px;
color:#94a3b8;
}

.loader{
margin:20px auto;
width:45px;
height:45px;
border:4px solid rgba(255,255,255,.1);
border-top:4px solid #22d3ee;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

@media(max-width:600px){
.erro{
font-size:90px;
}
h1{
font-size:25px;
}
p{
font-size:16px;
}
.container{
padding:30px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">ECALLAW</div>

<div class="erro">404</div>

<h1>Página não encontrada</h1>

<p>
Oops... o link acessado não existe ou foi removido.<br>
Mas nossa equipe técnica continua online para te ajudar.
</p>

<div class="loader"></div>

<div class="botoes">
<a href="index.html" class="btn home">Voltar ao Site</a>

<a href="https://wa.me/5521969472761" target="_blank" class="btn whats">
WhatsApp
</a>
</div>

<div class="info">
Redirecionando automaticamente em <span id="tempo">10</span>s
</div>

</div>

<script>
let tempo = 10;

setInterval(()=>{
tempo--;
document.getElementById("tempo").innerText = tempo;

if(tempo <= 0){
window.location.href="/";
}
},1000);
</script>

</body>
</html>
