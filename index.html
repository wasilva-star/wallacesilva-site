<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wallace Silva</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:80px 30px;
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}

.badge{
color:#22d3ee;
letter-spacing:4px;
font-size:14px;
margin-bottom:20px;
text-transform:uppercase;
}

h1{
font-size:60px;
margin-bottom:20px;
}

.sub{
font-size:24px;
color:#94a3b8;
margin-bottom:25px;
}

.desc{
max-width:700px;
line-height:1.8;
font-size:18px;
color:#cbd5e1;
}

.buttons{
margin-top:35px;
}

.btn{
display:inline-block;
padding:14px 24px;
margin-right:15px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.primary{
background:#06b6d4;
color:black;
}

.secondary{
border:1px solid #334155;
color:white;
}

.btn:hover{
transform:translateY(-3px);
}

footer{
text-align:center;
padding:30px;
color:#64748b;
}

@media(max-width:768px){
h1{
font-size:42px;
}
.sub{
font-size:20px;
}
}
</style>
</head>

<body>

<div class="container">
<section class="hero">

<div class="badge">Executive Tech Portfolio</div>

<h1>Wallace da Silva e Silva</h1>

<div class="sub">
Technology Specialist • IT Support • Systems Analyst
</div>

<p class="desc">
Profissional de TI com experiência em suporte corporativo,
infraestrutura, automação de processos,
desenvolvimento interno e análise de sistemas.
</p>

<div class="buttons">
<a class="btn primary" href="mailto:wallacesilvas@yahoo.com.br">
Contato
</a>

<a class="btn secondary" href="https://github.com/wasilva-star" target="_blank">
GitHub
</a>
</div>

</section>
</div>

<footer>
© 2026 Wallace Silva
</footer>

</body>
</html>
